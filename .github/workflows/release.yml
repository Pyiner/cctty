name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="cctty-${version}-${{ matrix.target }}.tar.gz"
          mkdir -p "dist/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/cctty" "dist/${{ matrix.target }}/"
          cp README.md LICENSE "dist/${{ matrix.target }}/"
          tar -C "dist/${{ matrix.target }}" -czf "dist/${archive}" cctty README.md LICENSE
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cctty-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate Homebrew formula
        run: |
          bash scripts/generate-homebrew-formula.sh "${GITHUB_REPOSITORY}" "${GITHUB_REF_NAME}" dist > dist/cctty.rb

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.tar.gz \
            dist/*.sha256 \
            dist/cctty.rb \
            --title "cctty ${GITHUB_REF_NAME}" \
            --generate-notes
