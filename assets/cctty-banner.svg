<svg width="1600" height="300" viewBox="0 0 1600 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">cctty banner</title>
  <desc id="desc">A pixel-style yellow cctty wordmark on a dark terminal background.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe15a"/>
      <stop offset="54%" stop-color="#ffd000"/>
      <stop offset="55%" stop-color="#f4b21d"/>
      <stop offset="100%" stop-color="#c77b2a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="8" dy="8" stdDeviation="0" flood-color="#5b3900"/>
      <feDropShadow dx="16" dy="16" stdDeviation="0" flood-color="#2f2305"/>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0v24" fill="none" stroke="#232323" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="300" rx="0" fill="#141414"/>
  <rect width="1600" height="300" fill="url(#grid)" opacity="0.38"/>
  <g font-family="Menlo, Consolas, 'Liberation Mono', monospace" font-weight="900" text-anchor="middle">
    <text x="800" y="185" font-size="188" letter-spacing="14" fill="none" stroke="#ffcf00" stroke-width="5" opacity="0.55">CCTTY</text>
    <text x="800" y="180" font-size="188" letter-spacing="14" fill="url(#gold)" filter="url(#shadow)">CCTTY</text>
    <text x="800" y="242" font-size="31" letter-spacing="9" fill="#f7f1d0">CLAUDE AGENT SDK THROUGH THE REAL TERMINAL</text>
  </g>
  <g fill="#ffd000" opacity="0.95">
    <rect x="78" y="62" width="16" height="16"/>
    <rect x="102" y="62" width="16" height="16"/>
    <rect x="126" y="62" width="16" height="16"/>
  </g>
  <path d="M78 238h168M1354 238h168" stroke="#ffd000" stroke-width="6" stroke-dasharray="18 12" opacity="0.75"/>
</svg>
